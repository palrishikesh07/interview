  <script>
    function debouncing(func, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer); // Clear if call before time out
        timer = setTimeout(() => {
          return func(...args);
        }, delay);
      };
    }
    function callAPI(value) {
      console.log("Calling API:", value);
    }

    const debouncingWithAPI = debouncing(callAPI, 2000);
    // function debouncingWithAPI1(value){

        debouncingWithAPI(event.target.value);

    // throttling function

    //     const now = Date.now();

    //       lastCall = now;
    //       return fn(...args);

    function throlle(fn, delay) {
      let lastCall = null;
      return (...args) => {
        const now = Date.now();
        if (lastCall == null || now - lastCall >= delay) {
          lastCall = now;
          return fn(...args);
        }
      };
    }

    function handleClick() {
      console.log("Button clicked at", new Date().toLocaleTimeString());
    }
    const throttledHandleClick = throlle(handleClick, 1000);
    document
      .getElementById("button")
      .addEventListener("click", throttledHandleClick);
